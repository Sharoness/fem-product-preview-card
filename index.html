<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      body {
        background-color: hsl(30, 38%, 92%);
        padding: 10px;
      }

      .montserrat-font {
        font-family: "Montserrat", sans-serif;
        font-optical-sizing: auto;
        /* font-weight: 500; */
        /* font-weight: 700; */
        font-style: normal;
        color: hsl(228, 12%, 48%);
      }

      .medium-font {
        font-weight: 500;
      }

      .bold-font {
        font-weight: 700;
      }

      .fraunces-font {
        font-family: "Fraunces", serif;
        font-optical-sizing: auto;
        font-weight: 700;
        font-style: normal;
        font-variation-settings: "SOFT" 0, "WONK" 0;
      }

      .sub-title {
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .title {
        font-size: 32px;
        color: hsl(212, 21%, 14%);
        margin: 20px 0px;
      }

      .product-img {
        display: block;
        max-width: 100%;
      }

      .icon-img {
        margin-right: 10px;
      }

      #body {
        background-color: hsl(0, 0%, 100%);
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        border-radius: 15px;
        overflow: hidden;
      }

      #content {
        padding: 25px;
      }

      .prices {
        display: flex;
        align-items: center;
        margin: 20px 0px;
      }

      .price {
        font-size: 32px;
        color: hsl(158, 36%, 37%);
      }

      .old-price {
        text-decoration: line-through;
        margin-left: 20px;
      }

      .add-to-cart {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 50px;
        color: hsl(0, 0%, 100%);
        background-color: hsl(158, 36%, 37%);
        border: none;
        border-radius: 10px;
      }

      .add-to-cart:hover {
        background-color: hsl(158, 42%, 18%);
        cursor: pointer;
      }

      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div id="body">
      <div>
        <img
          src="images/image-product-mobile.jpg"
          alt="Photo of the perfume bottle"
          class="product-img"
        />
      </div>
      <div id="content" class="montserrat-font">
        <div class="sub-title">Perfume</div>
        <div class="fraunces-font title">Gabrielle Essence Eau De Parfum</div>
        <div>
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </div>
        <div class="prices">
          <div class="fraunces-font price">$149.99</div>
          <div class="old-price">$169.99</div>
        </div>
        <button class="add-to-cart montserrat-font bold-font">
          <img src="images/icon-cart.svg" alt="Cart icon" class="icon-img" />
          <div>Add to Cart</div>
        </button>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Sharon</a>.
    </footer>
  </body>
</html>
